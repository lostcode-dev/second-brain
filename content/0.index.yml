title: Seu [Kortex]{class="text-primary"} para transformar ideias em ação
description: Capture, organize e conecte notas, hábitos, projetos e referências em um sistema inteligente. Construído com Nuxt e Supabase — para suas ideias evoluírem com você.
seo:
  title: Kortex
  description: Um sistema pessoal de conhecimento para capturar, organizar e transformar ideias em ação. Notas, hábitos e contexto em um só lugar.
navigation: false
hero:
  links:
    - label: Começar agora
      icon: i-lucide-arrow-right
      trailing: true
      to: /signup
      size: xl
    - label: Ver como funciona
      icon: i-lucide-book-open
      size: xl
      color: neutral
      variant: subtle
      to: /docs/getting-started
sections:
  - title: Capture e organize sem fricção
    description: Registre ideias rapidamente e mantenha tudo estruturado com notas, tags e coleções. Menos atrito, mais clareza.
    id: features
    orientation: horizontal
    features:
      - name: Captura rápida
        description: Uma caixa de entrada para anotar sem pensar — e organizar depois.
        icon: i-lucide-inbox
      - name: Organização estruturada
        description: Coleções e tags para encontrar e evoluir suas notas com contexto.
        icon: i-lucide-folders
      - name: Conexões que fazem sentido
        description: Relacione ideias, projetos e referências para virar insight acionável.
        icon: i-lucide-share-2
  - title: Hábitos que viram progresso
    description: Hábitos não são checklists. No Kortex, eles são sinais do que você está construindo — conectados a reflexões e resultados.
    orientation: horizontal
    reverse: true
    features:
      - name: Rastreamento flexível
        description: Hábitos diários/semanais com regras realistas (sem punição por descanso).
        icon: i-lucide-calendar-check
      - name: Check-in diário
        description: Um ritual rápido para registrar foco, obstáculos e um insight do dia.
        icon: i-lucide-check-square
      - name: Métricas simples
        description: Tendências semanais/mensais e heatmap para enxergar consistência.
        icon: i-lucide-line-chart
features:
  title: Tudo para evoluir seu conhecimento
  description: Um sistema único para capturar, organizar, conectar e transformar informação solta em ação consistente.
  items:
    - title: Notas com contexto
      description: Escreva, edite e organize notas com tags e coleções — sem perder o fio.
      icon: i-lucide-notebook-pen
    - title: Hábitos com propósito
      description: Acompanhe consistência com regras flexíveis e foco em tendência, não perfeição.
      icon: i-lucide-flame
    - title: Revisões e reflexão
      description: Check-ins diários e revisões semanais para aprender com o próprio processo.
      icon: i-lucide-clipboard-check
    - title: Busca rápida
      description: Encontre informação em segundos — mesmo com muitos dados.
      icon: i-lucide-search
    - title: Seguro e escalável
      description: Arquitetura moderna com Nuxt + Supabase, pronta para crescer com você.
      icon: i-lucide-shield
    - title: Personalizável
      description: Ajuste o sistema ao seu jeito de pensar, mantendo simplicidade e clareza.
      icon: i-lucide-sliders
testimonials:
  headline: Feito para a vida real
  title: Um sistema que acompanha seu pensamento
  description: Menos ansiedade com informação solta. Mais clareza, consistência e evolução ao longo do tempo.
  items:
    - quote: O check-in diário virou meu “fechamento” do dia. Em minutos eu registro o que importa e sigo leve.
      user:
        name: Sarah Chen
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: Conectar hábitos às notas mudou tudo. Eu vejo por que falhei e o que ajustar — sem culpa.
      user:
        name: Marcus Rodriguez
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: O heatmap semanal me dá consciência do ritmo. Eu paro antes de entrar em burnout.
      user:
        name: David Kumar
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: O sistema é simples, mas profundo. Quanto mais eu uso, mais sentido ele faz.
      user:
        name: Emily Zhang
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: Finalmente um lugar único para notas, projetos e referências — e não uma pilha de apps soltos.
      user:
        name: James Wilson
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: As revisões semanais me ajudam a ajustar o sistema com base em dados e reflexão.
      user:
        name: Lisa Patel
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=9
    - quote: O foco em consistência (não perfeição) fez eu voltar a cuidar do básico.
      user:
        name: Michael Torres
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=11
    - quote: A busca é rápida mesmo com muita coisa. Eu acho minhas notas quando preciso.
      user:
        name: Rachel Kim
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=10
    - quote: A caixa de entrada virou meu “capturador” padrão. Ideia veio, eu registro e sigo.
      user:
        name: Thomas Weber
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=12
    - quote: Eu gosto de como hábitos, notas e projetos conversam. Parece um sistema vivo.
      user:
        name: Sophia Martinez
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=14
cta:
  title: Pronto para começar com o Kortex?
  description: Comece pequeno, mantenha consistência e deixe suas ideias evoluírem com contexto.
  links:
    - label: Criar conta
      to: /signup
      trailingIcon: i-lucide-arrow-right
    - label: Ver documentação
      to: /docs/getting-started
      variant: subtle
      icon: i-lucide-book-open
