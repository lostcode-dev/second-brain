title: O [Kortex]{class="text-primary"} para organizar sua vida, trabalho e conhecimento
description: Centralize notas, tarefas, hábitos, metas, finanças e agenda em um único sistema pessoal. Do registro rápido à execução diária, com clareza e consistência.
seo:
  title: Kortex | Sistema pessoal de organização e produtividade
  description: Kortex é um sistema pessoal para capturar ideias, organizar tarefas, acompanhar hábitos e transformar conhecimento em ação com foco e consistência.
navigation: false
hero:
  links:
    - label: Começar agora
      icon: i-lucide-arrow-right
      trailing: true
      to: /signup
      size: xl
    - label: Ver como funciona
      icon: i-lucide-book-open
      size: xl
      color: neutral
      variant: subtle
      to: /docs/getting-started
sections:
  - title: Capture ideias e organize tudo sem fricção
    description: Registre pensamentos em segundos e transforme informação solta em um sistema claro com notas, tags, coleções e conexões.
    id: features
    orientation: horizontal
    features:
      - name: Captura rápida
        description: Use uma caixa de entrada para anotar no momento e processar quando for conveniente.
        icon: i-lucide-inbox
      - name: Organização estruturada
        description: Organize por coleções e tags para encontrar contexto e evoluir suas ideias com facilidade.
        icon: i-lucide-folders
      - name: Conexões que fazem sentido
        description: Conecte ideias, projetos e referências para gerar insights que viram próximos passos.
        icon: i-lucide-share-2
  - title: Hábitos, tarefas e metas em ritmo sustentável
    description: Planeje melhor a semana, acompanhe consistência e mantenha foco no progresso real com revisão contínua do que funciona.
    orientation: horizontal
    reverse: true
    features:
      - name: Rastreamento flexível
        description: Acompanhe hábitos diários e semanais com regras realistas, sem culpa por pausas estratégicas.
        icon: i-lucide-calendar-check
      - name: Check-in diário
        description: Registre foco, obstáculos e aprendizados em poucos minutos para melhorar a execução diária.
        icon: i-lucide-check-square
      - name: Métricas simples
        description: Visualize tendências e heatmaps para enxergar padrões e ajustar o sistema com dados.
        icon: i-lucide-line-chart
features:
  title: Um sistema completo para produtividade pessoal
  description: Tudo o que você precisa para capturar, organizar, priorizar e executar sem depender de dezenas de aplicativos separados.
  items:
    - title: Notas com contexto
      description: Escreva, edite e conecte notas com contexto para construir um segundo cérebro útil no dia a dia.
      icon: i-lucide-notebook-pen
    - title: Hábitos com propósito
      description: Mantenha consistência com regras flexíveis e foco em evolução contínua, não em perfeição.
      icon: i-lucide-flame
    - title: Tarefas e projetos
      description: Organize prioridades, avance em projetos e acompanhe entregas importantes em um só lugar.
      icon: i-lucide-check-check
    - title: Metas conectadas
      description: Conecte tarefas e hábitos às suas metas para transformar intenção em resultado.
      icon: i-lucide-target
    - title: Revisões e reflexão
      description: Faça check-ins diários e revisões semanais para aprender com o próprio processo.
      icon: i-lucide-clipboard-check
    - title: Finanças e agenda
      description: Acompanhe compromissos, receitas e despesas para tomar decisões com visão completa da rotina.
      icon: i-lucide-wallet
    - title: Busca rápida
      description: Encontre qualquer informação em segundos, mesmo com grande volume de conteúdo.
      icon: i-lucide-search
    - title: Seguro e escalável
      description: Arquitetura moderna com Nuxt e Supabase para desempenho, segurança e crescimento.
      icon: i-lucide-shield
    - title: Personalizável
      description: Adapte o sistema ao seu estilo de organização sem abrir mão de simplicidade.
      icon: i-lucide-sliders
testimonials:
  headline: Feito para a vida real
  title: Clareza para decidir, consistência para evoluir
  description: Menos sobrecarga mental, mais foco no que importa todos os dias.
  items:
    - quote: O check-in diário virou meu “fechamento” do dia. Em minutos eu registro o que importa e sigo leve.
      user:
        name: Sarah Chen
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: Conectar hábitos às notas mudou tudo. Eu vejo por que falhei e o que ajustar — sem culpa.
      user:
        name: Marcus Rodriguez
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: O heatmap semanal me dá consciência do ritmo. Eu paro antes de entrar em burnout.
      user:
        name: David Kumar
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: O sistema é simples, mas profundo. Quanto mais eu uso, mais sentido ele faz.
      user:
        name: Emily Zhang
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: Finalmente um lugar único para notas, projetos e referências — e não uma pilha de apps soltos.
      user:
        name: James Wilson
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: As revisões semanais me ajudam a ajustar o sistema com base em dados e reflexão.
      user:
        name: Lisa Patel
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=9
    - quote: O foco em consistência (não perfeição) fez eu voltar a cuidar do básico.
      user:
        name: Michael Torres
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=11
    - quote: A busca é rápida mesmo com muita coisa. Eu acho minhas notas quando preciso.
      user:
        name: Rachel Kim
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=10
    - quote: A caixa de entrada virou meu “capturador” padrão. Ideia veio, eu registro e sigo.
      user:
        name: Thomas Weber
        description: Usuário do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=12
    - quote: Eu gosto de como hábitos, notas e projetos conversam. Parece um sistema vivo.
      user:
        name: Sophia Martinez
        description: Usuária do Kortex
        avatar:
          src: https://i.pravatar.cc/120?img=14
cta:
  title: Pronto para organizar tudo em um só lugar?
  description: Comece hoje no Kortex e transforme informação dispersa em progresso consistente.
  links:
    - label: Criar conta
      to: /signup
      trailingIcon: i-lucide-arrow-right
    - label: Ver documentação
      to: /docs/getting-started
      variant: subtle
      icon: i-lucide-book-open
